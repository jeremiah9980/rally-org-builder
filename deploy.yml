name: Deploy to GitHub Pages

# Deploys the repo root (build-free static site) to GitHub Pages on every push to main.
# This makes deploy explicit and identical across every org repo — no "Deploy from a
# branch" toggle to forget, and any failure shows up in the Actions tab instead of silently
# doing nothing.
#
# ONE-TIME per new repo: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
# (Or run scripts/ship-to-repo.sh, which sets this for you via the API.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .          # whole site lives at root; no build step
      - id: deployment
        uses: actions/deploy-pages@v4
